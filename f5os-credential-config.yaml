---
# AWX UI:
# Administration -> Credential Types -> Add
# Paste `input_configuration` into Input Configuration.
# Paste `injector_configuration` into Injector Configuration.
name: "F5 F5OS Auth Env"
kind: "cloud"

input_configuration:
  fields:
    - id: f5_username
      label: F5 Username
      type: string
    - id: f5_password
      label: F5 Password
      type: string
      secret: true
    - id: f5_validate_certs
      label: Validate Certs
      type: boolean
  required:
    - f5_username
    - f5_password

injector_configuration:
  env:
    F5_USERNAME: "{{ f5_username }}"
    F5_PASSWORD: "{{ f5_password }}"
    F5_VALIDATE_CERTS: "{{ f5_validate_certs | default(false) }}"
