# Network runtime builder.
# Shapes aggregated network fragments into final present/delete collections consumed by audit and runtime tasks.
---
- name: Classify network interface operations
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    classification_label: "network interfaces"
    source_items: "{{ network_interfaces_aggregate | default([]) }}"
    source_delete_items: "{{ network_interfaces_delete_aggregate | default([]) }}"
    present_var: "network_interfaces_present"
    delete_var: "network_interfaces_delete"

