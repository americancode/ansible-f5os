# Network variable loader.
# Builds aggregated raw collections from the network var tree and deletion tree.
---
- name: Load network interface fragments
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: "network interfaces"
    source_root: "{{ repo_root }}/vars/network/interfaces"
    deletion_root: "{{ repo_root }}/vars/network/deletions/interfaces"
    fragment_var_name: "network_interfaces_fragment"
    aggregate_var: "network_interfaces_aggregate"
    deletion_aggregate_var: "network_interfaces_delete_aggregate"
    collection_key: "interfaces"
    defaults_key: "interface_defaults"

