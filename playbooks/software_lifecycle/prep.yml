# Software lifecycle prep orchestrator.
# Produces canonical runtime sets for system image imports, software installs, tenant images, and VELOS partition images.
---
- name: Load software lifecycle var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/software_lifecycle/prep/load-vars.yml"

- name: Build software lifecycle runtime facts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/software_lifecycle/prep/build-runtime.yml"
