# Software lifecycle manage tasks.
# Runtime effect: dispatch either audit preview or runtime delete/apply for image and software lifecycle object families.
---
- name: Audit planned software lifecycle objects
  ansible.builtin.import_tasks: audit.yml
  when: audit_mode | default(false)

- name: Remove managed software lifecycle objects
  ansible.builtin.import_tasks: delete.yml
  when: not (audit_mode | default(false))

- name: Apply desired software lifecycle objects
  ansible.builtin.import_tasks: apply.yml
  when: not (audit_mode | default(false))
