# System runtime builder.
# Shapes aggregated system fragments into final present/delete collections consumed by audit and runtime tasks.
---
- name: Classify system settings operations
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    classification_label: "system settings"
    source_items: "{{ system_settings_aggregate | default([]) }}"
    source_delete_items: "{{ system_settings_delete_aggregate | default([]) }}"
    present_var: "system_settings_present"
    delete_var: "system_settings_delete"

