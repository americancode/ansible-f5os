# System variable loader.
# Builds aggregated raw collections from the system var tree and deletion tree.
---
- name: Load system setting fragments
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: "system settings"
    source_root: "{{ repo_root }}/vars/system/system"
    deletion_root: "{{ repo_root }}/vars/system/deletions/system"
    fragment_var_name: "system_settings_fragment"
    aggregate_var: "system_settings_aggregate"
    deletion_aggregate_var: "system_settings_delete_aggregate"
    collection_key: "systems"
    defaults_key: "system_defaults"

