# System audit tasks.
# Runtime effect: prints planned system delete/apply collections before any F5OS module calls.
---
- name: Announce system audit mode
  ansible.builtin.debug:
    msg:
      - "AUDIT MODE system for {{ inventory_hostname }} -> {{ provider.server }}"
      - "No F5OS changes will be made."

- name: Print system delete collections
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/tasks/audit-collection.yml"
  vars:
    audit_phase: "DELETE"
    audit_collection_name: "{{ item.name }}"
    audit_collection_items: "{{ item.items }}"
  loop:
    - { name: "system_settings_delete", items: "{{ system_settings_delete | default([]) }}" }
    - { name: "system_dns_delete", items: "{{ system_dns_delete | default([]) }}" }
    - { name: "system_ntp_delete", items: "{{ system_ntp_delete | default([]) }}" }
    - { name: "system_logging_delete", items: "{{ system_logging_delete | default([]) }}" }
    - { name: "system_allowed_ips_delete", items: "{{ system_allowed_ips_delete | default([]) }}" }
    - { name: "system_auth_delete", items: "{{ system_auth_delete | default([]) }}" }
    - { name: "system_auth_servers_delete", items: "{{ system_auth_servers_delete | default([]) }}" }
    - { name: "system_auth_ldap_delete", items: "{{ system_auth_ldap_delete | default([]) }}" }
    - { name: "system_users_delete", items: "{{ system_users_delete | default([]) }}" }
    - { name: "system_user_password_changes_delete", items: "{{ system_user_password_changes_delete | default([]) }}" }
    - { name: "system_tls_delete", items: "{{ system_tls_delete | default([]) }}" }
    - { name: "system_snmp_delete", items: "{{ system_snmp_delete | default([]) }}" }
    - { name: "system_imported_tls_delete", items: "{{ system_imported_tls_delete | default([]) }}" }
  loop_control:
    label: "{{ item.name }}"

- name: Print system apply collections
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/tasks/audit-collection.yml"
  vars:
    audit_phase: "APPLY"
    audit_collection_name: "{{ item.name }}"
    audit_collection_items: "{{ item.items }}"
  loop:
    - { name: "system_settings_present", items: "{{ system_settings_present | default([]) }}" }
    - { name: "system_dns_present", items: "{{ system_dns_present | default([]) }}" }
    - { name: "system_ntp_present", items: "{{ system_ntp_present | default([]) }}" }
    - { name: "system_logging_present", items: "{{ system_logging_present | default([]) }}" }
    - { name: "system_allowed_ips_present", items: "{{ system_allowed_ips_present | default([]) }}" }
    - { name: "system_auth_present", items: "{{ system_auth_present | default([]) }}" }
    - { name: "system_auth_servers_present", items: "{{ system_auth_servers_present | default([]) }}" }
    - { name: "system_auth_ldap_present", items: "{{ system_auth_ldap_present | default([]) }}" }
    - { name: "system_users_present", items: "{{ system_users_present | default([]) }}" }
    - { name: "system_user_password_changes_present", items: "{{ system_user_password_changes_present | default([]) }}" }
    - { name: "system_tls_present", items: "{{ system_tls_present | default([]) }}" }
    - { name: "system_snmp_present", items: "{{ system_snmp_present | default([]) }}" }
    - { name: "system_imported_tls_present", items: "{{ system_imported_tls_present | default([]) }}" }
  loop_control:
    label: "{{ item.name }}"
