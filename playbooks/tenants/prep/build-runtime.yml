# Tenants runtime builder.
# Shapes aggregated fragments into final present/delete collections consumed by audit and runtime tasks.
---
- name: Classify tenant operations
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    classification_label: "tenants"
    source_items: "{{ tenants_aggregate | default([]) }}"
    source_delete_items: "{{ tenants_delete_aggregate | default([]) }}"
    present_var: "tenants_present"
    delete_var: "tenants_delete"

- name: Classify tenant console operations
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
