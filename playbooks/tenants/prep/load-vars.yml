# Tenants variable loader.
# Builds aggregated raw collections from the tenants var tree and deletion tree.
---
- name: Load tenant fragments
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: "tenants"
    source_root: "{{ repo_root }}/vars/tenants/tenants"
    deletion_root: "{{ repo_root }}/vars/tenants/deletions/tenants"
    fragment_var_name: "tenant_fragment"
    aggregate_var: "tenants_aggregate"
    deletion_aggregate_var: "tenants_delete_aggregate"
    collection_key: "tenants"
    defaults_key: "tenant_defaults"

- name: Load tenant console fragments
  ansible.builtin.include_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: "tenant console"
