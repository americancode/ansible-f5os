    deletion_root: "{{ repo_root }}/vars/tenants/deletions/tenant_console"
    fragment_var_name: "tenant_console_fragment"
    aggregate_var: "tenant_console_aggregate"
    deletion_aggregate_var: "tenant_console_delete_aggregate"
    collection_key: "tenant_console_users"
    defaults_key: "tenant_console_defaults"

