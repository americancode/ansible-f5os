# Tenants manage tasks.
# Runtime effect: dispatch either audit preview or runtime delete/apply for tenant and VELOS partition object families.
---
- name: Audit planned tenant objects
  ansible.builtin.import_tasks: audit.yml
  when: audit_mode | default(false)

- name: Remove managed tenant objects
  ansible.builtin.import_tasks: delete.yml
  when: not (audit_mode | default(false))

- name: Apply desired tenant objects
  ansible.builtin.import_tasks: apply.yml
  when: not (audit_mode | default(false))
