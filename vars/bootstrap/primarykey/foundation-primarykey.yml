# Bootstrap primary key examples for initial controller trust seeding.
# These objects are consumed only during bootstrap and are not auto-deleted later.
# Supported fields: `name`, `passphrase`, `salt`, `force_update`, and `state`.
primary_keys:
  - name: foundation-primary-key
    passphrase: CHANGEME-PASSPHRASE
    salt: CHANGEME-SALT
    state: present
