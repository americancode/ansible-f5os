---
# AWX usage:
# 1. Put the target F5OS endpoint in the inventory host var `f5_host`.
# 2. Create a Custom Credential Type from `f5os-credential-config.yaml`.
# 3. Create a Credential from that type for auth only.
# 4. Attach the Credential to the Job Template.
# 5. Use `platform_type` to distinguish rSeries and VELOS-specific flows when needed.
provider:
  server: "{{ f5_host | default(lookup('env', 'F5_HOST'), true) | default('f5os-controller.example.com', true) }}"
  user: "{{ lookup('env', 'F5_USERNAME') | default('admin', true) }}"
  password: "{{ lookup('env', 'F5_PASSWORD') }}"
  server_port: "{{ f5_server_port | default(lookup('env', 'F5_SERVER_PORT'), true) | default(8888, true) }}"
  validate_certs: "{{ lookup('env', 'F5_VALIDATE_CERTS') | default(false, true) }}"

platform_type: "{{ f5_platform_type | default(lookup('env', 'F5_PLATFORM_TYPE'), true) | default('rseries', true) }}"

# F5OS uses the HTTPAPI connection plugin rather than `connection: local`.
ansible_host: "{{ provider.server }}"
ansible_user: "{{ provider.user }}"
ansible_httpapi_password: "{{ provider.password }}"
ansible_httpapi_port: "{{ provider.server_port }}"
ansible_network_os: "f5networks.f5os.f5os"
ansible_httpapi_use_ssl: true
ansible_httpapi_use_proxy: false
ansible_httpapi_validate_certs: "{{ provider.validate_certs }}"
ansible_command_timeout: "{{ f5_command_timeout | default(1800, true) }}"
persistent_log_messages: "{{ f5_persistent_log_messages | default(false, true) }}"

# Set `audit_mode: true` at launch time to print the final delete/apply runtime
# collections after prep without executing F5OS modules.
audit_mode: false
audit_show_empty: false
