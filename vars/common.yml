---
# AWX usage:
# 1. Put the target F5OS endpoint in the inventory host var `f5_host`.
# 2. Provide credentials through AWX or environment variables.
# 3. Use `platform_type` to distinguish rSeries and VELOS-specific flows when needed.
provider:
  server: "{{ f5_host | default(lookup('env', 'F5_HOST'), true) | default('f5os-controller.example.com', true) }}"
  user: "{{ lookup('env', 'F5_USERNAME') | default('admin', true) }}"
  password: "{{ lookup('env', 'F5_PASSWORD') }}"
  server_port: "{{ f5_server_port | default(lookup('env', 'F5_SERVER_PORT'), true) | default(443, true) }}"
  validate_certs: "{{ lookup('env', 'F5_VALIDATE_CERTS') | default(false, true) }}"

platform_type: "{{ f5_platform_type | default(lookup('env', 'F5_PLATFORM_TYPE'), true) | default('rseries', true) }}"

# Set `audit_mode: true` at launch time to print the final delete/apply runtime
# collections after prep without executing F5OS modules.
audit_mode: false
audit_show_empty: false
