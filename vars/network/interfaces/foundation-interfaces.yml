---
# Interface examples for platform port configuration.
# These objects are consumed by the network playbook and may be referenced by LAG and VLAN definitions.
# Supported fields: `name`, `description`, `enabled`, `forward_error_correction`,
# `native_vlan`, `trunk_vlans`, and `state`.
interfaces:
  - name: 1.0
    enabled: true
    description: uplink-a
    forward_error_correction: auto
    state: present
  - name: 1.1
    enabled: true
    description: uplink-b
    forward_error_correction: auto
    state: present
