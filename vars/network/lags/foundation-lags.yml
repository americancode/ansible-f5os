---
# LAG examples for aggregated uplink configuration.
# These objects may reference interface names from `vars/network/interfaces/`.
# Supported fields: `name`, `lag_type`, `mode`, `interval`, `native_vlan`,
# `trunk_vlans`, `config_members`, and `state`.
lags:
  - name: lag10
    lag_type: lacp
    mode: active
    interval: slow
    trunk_vlans:
      - 110
    config_members:
      - "1.0"
      - "1.1"
    state: present
