---
# Auth server examples for external AAA integration.
# These objects are referenced by auth configs in `vars/system/auth/`.
# Supported fields: `name`, `provider_type`, `server`, `force_update`, and `state`.
auth_servers:
  - name: corporate-radius
    provider_type: radius
    server:
      - server_ip: 192.0.2.200
        port: 1812
        secret: CHANGEME-RADIUS-SECRET
        timeout: 5
    state: present
