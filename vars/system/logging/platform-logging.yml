---
# Logging profile examples for remote log forwarding and local logging policy.
# These objects are consumed by the system playbook.
# Supported fields: `name`, `remote_servers`, `facility`, `severity`, and `state`.
logging_profiles:
  - name: remote-syslog
    remote_servers:
      - host: 192.0.2.151
        port: 514
    facility: local0
    severity: informational
    state: present
