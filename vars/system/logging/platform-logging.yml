---
# Logging profile examples for remote log forwarding and local logging policy.
# These objects are consumed by the system playbook.
# Supported fields: `name`, `include_hostname`, `servers`, `remote_forwarding`, `tls`, `ca_bundles`, and `state`.
logging_profiles:
  - name: remote-syslog
    include_hostname: true
    servers:
      - address: 192.0.2.151
        protocol: udp
        port: 514
        logs:
          - facility: local0
            severity: informational
          - facility: authpriv
            severity: notice
    state: present
