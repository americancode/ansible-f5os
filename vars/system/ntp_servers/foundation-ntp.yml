# NTP server examples for system clock synchronization.
# These objects are consumed by the system playbook.
# Supported fields: `server`, `key_id`, `prefer`, `iburst`, `ntp_service`, `ntp_authentication`, and `state`.
ntp_servers:
  - server: 192.0.2.123
    prefer: true
    iburst: true
    ntp_service: true
    state: present
  - server: 192.0.2.124
    prefer: false
    iburst: true
    state: present
