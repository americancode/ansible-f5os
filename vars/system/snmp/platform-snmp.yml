---
# SNMP configuration examples for monitoring integration.
# These objects are consumed by the system playbook.
# Supported fields: `name`, `contact`, `location`, `communities`, and `state`.
snmp_configs:
  - name: default-snmp
    contact: noc@example.com
    location: primary-datacenter
    communities:
      - name: public-readonly
        access: ro
    state: present
