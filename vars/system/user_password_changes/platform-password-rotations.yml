---
# User password change examples for operational password rotation.
# These objects are consumed by the system playbook and map to the non-idempotent
# `f5os_user_password_change` module for local users only.
# Supported fields: `user_name`, `old_password`, and `new_password`.
user_password_changes:
  - user_name: platformadmin
    old_password: CHANGEME-OLD-PASSWORD
    new_password: CHANGEME-NEW-PASSWORD
