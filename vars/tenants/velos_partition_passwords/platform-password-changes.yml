# VELOS partition password change examples for operational account rotation.
# These objects are consumed by `velos_partition_change_password`.
# Supported fields: `user_name`, `old_password`, `new_password`, and `platform`.
velos_partition_password_changes:
  - user_name: admin
    old_password: CHANGEME-OLD-PASSWORD
    new_password: CHANGEME-NEW-PASSWORD
    platform: velos-controller
